<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画面モック ( テスト用 )</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>コメント投稿フォーム</h1>
        <p>仕様に対するフィードバックを入力してください。</p>
        <form action="#" method="POST" onsubmit="return false;">
            <div class="form-group">
                <label for="comment">コメント内容:</label>
                <textarea id="comment" name="comment" placeholder="ここにコメントを入力してください"></textarea>
            </div>
            <button type="submit" class="btn">送信する</button>
        </form>
    </div>
</body>
</html>
